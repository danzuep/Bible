<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bible in Many Languages</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    margin: 2rem;
    background: #f9f9f9;
    color: #222;
  }
  details {
    margin-bottom: 1rem;
    border: 1px solid #ccc;
    border-radius: 4px;
    background: #fff;
  }
  summary {
    cursor: pointer;
    padding: 0.5rem 1rem;
    font-weight: bold;
    font-size: 1.1rem;
    user-select: none;
  }
  ul {
    padding-left: 1.5rem;
    margin: 0.5rem 0 1rem;
  }
  a {
    text-decoration: none;
    color: #0066cc;
  }
  a:hover,
  a:focus {
    text-decoration: underline;
  }
</style>
</head>
<body>

<details open>
